x-app: &app
  build:
    context: .
    target: development
  env_file:
    - .env
  volumes:
    - .:/app
    - node_modules:/app/node_modules

services:
  app:
    <<: *app
    command: npm run dev
    environment:
      NODE_ENV: development
      DATABASE_HOST: db
      WATCHPACK_POLLING: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-postgres}
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  lint:
    <<: *app
    command: npm run lint
    profiles:
      - ci

  test:
    <<: *app
    command: npm test
    environment:
      NODE_ENV: test
    profiles:
      - ci

volumes:
  node_modules:
  postgres-data:
